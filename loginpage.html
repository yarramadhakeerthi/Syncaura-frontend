<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style9.css" />
</head>
<body>
  <main class="login-card">
    <section class="art-panel" aria-hidden="true">
      <div class="sky-stars"></div>
      <div class="orb orb-one"></div><div class="orb orb-two"></div>
      <svg class="neon-illustration" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="halo" cx="50%" cy="48%"><stop stop-color="#126cff" stop-opacity=".3"/><stop offset=".58" stop-color="#0d4bb9" stop-opacity=".09"/><stop offset="1" stop-color="#061c58" stop-opacity="0"/></radialGradient>
          <linearGradient id="glass" x1=".12" y1=".05" x2=".9" y2=".96"><stop stop-color="#0f67e8" stop-opacity=".36"/><stop offset=".32" stop-color="#071e61" stop-opacity=".19"/><stop offset=".73" stop-color="#020c31" stop-opacity=".33"/><stop offset="1" stop-color="#0960d5" stop-opacity=".27"/></linearGradient>
          <radialGradient id="person" cx="36%" cy="18%"><stop stop-color="#2e9cff"/><stop offset=".37" stop-color="#0870ef"/><stop offset=".72" stop-color="#0736a7"/><stop offset="1" stop-color="#020f53"/></radialGradient>
          <linearGradient id="body" x1=".24" y1="0" x2=".8" y2="1"><stop stop-color="#35a1ff"/><stop offset=".26" stop-color="#0e66e5"/><stop offset=".7" stop-color="#0632a0"/><stop offset="1" stop-color="#03175e"/></linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="13"/></filter>
        </defs>
        <circle cx="280" cy="285" r="250" fill="url(#halo)"/>
        <path d="M280 68 472 166v167c0 101-75 159-192 207C163 492 88 434 88 333V166L280 68Z" fill="#07327f" fill-opacity=".13" stroke="#1354bd" stroke-opacity=".3" stroke-width="1.5"/>
        <path d="M280 95 433 173v143c0 82-58 132-153 175-95-43-153-93-153-175V173L280 95Z" fill="url(#glass)" stroke="#1798ff" stroke-width="3" filter="url(#glow)"/>
        <path d="M280 103 425 177" fill="none" stroke="#7ad7ff" stroke-opacity=".62" stroke-width="2"/>
        <path d="M128 177V316c0 68 39 113 99 150" fill="none" stroke="#0a77df" stroke-opacity=".54" stroke-width="2"/>
        <ellipse cx="280" cy="274" rx="113" ry="152" fill="#126eff" fill-opacity=".15" filter="url(#softGlow)"/>
        <circle cx="280" cy="229" r="69" fill="url(#person)" stroke="#159bff" stroke-opacity=".83" stroke-width="2" filter="url(#glow)"/>
        <ellipse cx="280" cy="289" rx="26" ry="18" fill="url(#person)" stroke="#168fff" stroke-opacity=".55"/>
        <path d="M159 438c0-83 52-137 121-137s121 54 121 137c-31 27-71 51-121 73-50-22-90-46-121-73Z" fill="url(#body)" stroke="#1395ff" stroke-opacity=".82" stroke-width="2" filter="url(#glow)"/>
        <path d="M168 429c17-73 63-116 112-116" fill="none" stroke="#71caff" stroke-opacity=".22" stroke-width="3"/>
        <ellipse cx="280" cy="341" rx="264" ry="68" transform="rotate(-17 280 341)" fill="none" stroke="#1d8dff" stroke-opacity=".38" stroke-width="2"/>
        <path d="M42 395c50 51 188 38 309-27 121-64 192-137 165-174" fill="none" stroke="#43b5ff" stroke-width="2.4" filter="url(#glow)"/>
        <circle cx="108" cy="407" r="4" fill="#b4edff" filter="url(#glow)"/>
      </svg>
    </section>

    <section class="form-panel">
      <form id="login-form">
        <h1>Welcome <span>Back</span></h1>
        <p class="subtitle">Login to continue your journey.</p>
        <label class="field"><span class="sr-only">Email address</span>
          <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <input type="email" placeholder="Email" aria-label="Email address" />
        </label>
        <label class="field password-field"><span class="sr-only">Password</span>
          <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          <input id="password" type="password" placeholder="Password" aria-label="Password" />
          <button class="eye-button" type="button" aria-label="Show password">
            <svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="2.5"/></svg>
          </button>
        </label>
        <div class="options">
          <label class="remember"><input type="checkbox" checked /><span class="checkmark">✓</span><span>Remember Me</span></label>
          <a href="#forgot">Forgot Password?</a>
        </div>
        <button class="sign-in" type="submit">Log In</button>
        <div class="divider"><i></i><span>OR</span><i></i></div>
        <div class="socials">
          <button type="button" aria-label="Google" class="social google"><svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3A12 12 0 1 1 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7A19.9 19.9 0 1 0 44 24c0-1.2-.1-2.4-.4-3.5Z"/><path fill="#FF3D00" d="M6.3 14.7 12.9 19.5A12 12 0 0 1 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7A19.9 19.9 0 0 0 6.3 14.7Z"/><path fill="#4CAF50" d="M24 44c5.1 0 9.7-1.9 13.2-5l-6.1-5.2A12.1 12.1 0 0 1 12.7 28l-6.6 5.1A20 20 0 0 0 24 44Z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.2 5.8l.1-.1 6.1 5.2C36.8 39.4 44 34 44 24c0-1.2-.1-2.4-.4-3.5Z"/></svg></button>
          <button type="button" aria-label="GitHub" class="social github"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.69c-2.78.6-3.37-1.18-3.37-1.18-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.54 1.04 1.54 1.04.9 1.54 2.35 1.1 2.92.84.09-.65.35-1.1.64-1.35-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.5 9.5 0 0 1 12 6.8c.85 0 1.7.11 2.5.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.9.68 1.81v2.68c0 .26.18.57.69.48A10 10 0 0 0 12 2Z"/></svg></button>
          <button type="button" aria-label="Facebook" class="social facebook"><svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="20" fill="#1877F2"/><path fill="#fff" d="M27.2 39V26.2h4.3l.6-5h-4.9V18c0-1.45.4-2.45 2.5-2.45h2.7v-4.48c-.47-.06-2.08-.2-3.95-.2-3.91 0-6.59 2.39-6.59 6.78v3.55h-4.42v5h4.42V39h5.3Z"/></svg></button>
        </div>
        <p class="signup">Don’t have an account? <a href="#signup">Sign Up</a></p>
      </form>
    </section>
  </main>
  <div class="toast" role="status">Log in successfully</div>
  <script src="script5.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style9.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-side">

    <div class="curve"></div>

    <img
    src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
    alt="User Login"
    class="login-image">
    >

</div>
    <!-- RIGHT SIDE -->
    <div class="right-side">

        <div class="form-container">

            <h1>Welcome Back</h1>

            <!-- EMAIL -->
            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address">
            </div>

            <!-- PASSWORD -->
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>

            <p class="forgot-password">Forgot Password?</p>

            <button class="signin-btn" onclick="login()">
                Sign In
            </button>

            <!-- Divider -->
            <div class="divider">
                <div class="line"></div>
                <span>Or continue with</span>
                <div class="line"></div>
            </div>

            <!-- Social Login -->
            <div class="social-buttons">

                <button>
                    <img src="https://cdn.simpleicons.org/google" alt="Google" width="25">
                </button>

                <button>
                    <img src="https://cdn.simpleicons.org/github" alt="GitHub" width="25">
                </button>

                <button>
                    <img src="https://cdn.simpleicons.org/facebook" alt="Facebook" width="25">
                </button>

            </div>

            <p class="signup-text">
                Don't have an account?
                <a href="#">Sign Up</a>
            </p>

        </div>

    </div>

</div>

<script src="script5.js"></script>

</body>
</html>

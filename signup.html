<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup.css" />
</head>
<body>
  <main class="signup-card">
    <section class="signup-art" aria-hidden="true"><div class="art-caption"><span class="tiny-dot"></span><span>SECURE YOUR JOURNEY</span></div></section>
    <section class="signup-panel">
      <form id="signup-form">
        <p class="eyebrow">START YOUR JOURNEY</p>
        <h1>Create <span>Account</span></h1>
        <p class="subtitle">Join us and explore what’s possible.</p>
        <div class="field-row">
          <label class="field"><span class="label">Full name</span><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c.7-3.4 3.1-5.2 7-5.2s6.3 1.8 7 5.2"/></svg><input required placeholder="Your full name" /></label>
          <label class="field"><span class="label">Email address</span><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><input type="email" required placeholder="name@example.com" /></label>
        </div>
        <label class="field"><span class="label">Password</span><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><input class="password" type="password" required placeholder="Create a strong password" /><button type="button" class="eye" aria-label="Show password">⌁</button></label>
        <label class="field"><span class="label">Confirm password</span><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><input class="password" type="password" required placeholder="Confirm your password" /><button type="button" class="eye" aria-label="Show password">⌁</button></label>
        <label class="terms"><input type="checkbox" required><span class="box">✓</span><span>I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>.</span></label>
        <button class="create" type="submit">Create Account <span>→</span></button>
        <div class="divider"><i></i><span>OR CONTINUE WITH</span><i></i></div>
        <div class="socials">
          <button type="button" class="social google" aria-label="Google"><svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3A12 12 0 1 1 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7A19.9 19.9 0 1 0 44 24c0-1.2-.1-2.4-.4-3.5Z"/><path fill="#FF3D00" d="M6.3 14.7 12.9 19.5A12 12 0 0 1 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7A19.9 19.9 0 0 0 6.3 14.7Z"/><path fill="#4CAF50" d="M24 44c5.1 0 9.7-1.9 13.2-5l-6.1-5.2A12.1 12.1 0 0 1 12.7 28l-6.6 5.1A20 20 0 0 0 24 44Z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3a12 12 0 0 1-4.2 5.8l.1-.1 6.1 5.2C36.8 39.4 44 34 44 24c0-1.2-.1-2.4-.4-3.5Z"/></svg></button>
          <button type="button" class="social github" aria-label="GitHub"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.69c-2.78.6-3.37-1.18-3.37-1.18-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.54 1.04 1.54 1.04.9 1.54 2.35 1.1 2.92.84.09-.65.35-1.1.64-1.35-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.5 9.5 0 0 1 12 6.8c.85 0 1.7.11 2.5.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.9.68 1.81v2.68c0 .26.18.57.69.48A10 10 0 0 0 12 2Z"/></svg></button>
          <button type="button" class="social facebook" aria-label="Facebook"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#1877F2"/><path fill="#fff" d="M27.2 39V26.2h4.3l.6-5h-4.9V18c0-1.45.4-2.45 2.5-2.45h2.7v-4.48c-.47-.06-2.08-.2-3.95-.2-3.91 0-6.59 2.39-6.59 6.78v3.55h-4.42v5h4.42V39h5.3Z"/></svg></button>
        </div>
        <p class="login-link">Already have an account? <a href="index.html">Log In</a></p>
      </form>
    </section>
  </main>
  <div class="toast">Account created successfully</div>
  <script src="signup.js"></script>
</body>
</html>
